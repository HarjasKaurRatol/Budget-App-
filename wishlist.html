    <script>
      document.querySelector('.side-nav').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-nav-action],[data-nav-target]');
        if (!btn) return;
        const action = btn.dataset.navAction;
        const target = btn.dataset.navTarget;
        if (action === 'top') {
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else if (action === 'save-data') {
          document.getElementById('saveWishlistBtn')?.click();
        } else if (action === 'calculator' || action === 'add-expense' || target) {
          window.location.href = target ? `index.html#${target}` : 'index.html';
        }
      });
    </script>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
      import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDtT5vyC42DwQ0dQ3PIhP53weNXnHQBzgs",
        authDomain: "budget-app-50d20.firebaseapp.com",
        projectId: "budget-app-50d20",
        storageBucket: "budget-app-50d20.firebasestorage.app",
        messagingSenderId: "1044990034588",
        appId: "1:1044990034588:web:2ac9351e66429e9beae359"
      };

      const firebaseApp = initializeApp(firebaseConfig);
      const db = getFirestore(firebaseApp);
      const FIRESTORE_DOC = doc(db, "budget", "mydata");
      const STORAGE_KEY = "budget-snapshot-state";
      const SAFETY_BUFFER = 600;
      const TREAT_SAFETY_BUFFER = 300;
      const TREAT_MODES = {
        Conservative: { percent: 0.05, cap: 25, cardThreshold: 0.25 },
        Balanced:     { percent: 0.1,  cap: 50, cardThreshold: 0.4  },
        Flexible:     { percent: 0.15, cap: 75, cardThreshold: 0.55 }
      };
      const PRIORITY_ORDER = { high: 0, medium: 1, low: 2 };
      const PRIORITY_LABELS = { high: "High priority", medium: "Medium priority", low: "Low priority" };

      // ── DOM refs ──────────────────────────────────────────
      const wishlistItemsEl      = document.querySelector("#wishlistItems");
      const addWishlistItemBtn   = document.querySelector("#addWishlistItemBtn");
      const saveWishlistBtn      = document.querySelector("#saveWishlistBtn");
      const suggestTreatBtn      = document.querySelector("#suggestTreatBtn");
      const treatSuggestionCard  = document.querySelector("#treatSuggestionCard");
      const treatPriorityBadge   = document.querySelector("#treatPriorityBadge");
      const treatSuggestionName  = document.querySelector("#treatSuggestionName");
      const treatSuggestionPrice = document.querySelector("#treatSuggestionPrice");
      const treatSuggestionReason= document.querySelector("#treatSuggestionReason");
      const treatSavingsTimeline = document.querySelector("#treatSavingsTimeline");
      const treatSuggestionLink  = document.querySelector("#treatSuggestionLink");
      const treatMarkBoughtBtn   = document.querySelector("#treatMarkBoughtBtn");
      const treatAlsoAffordable  = document.querySelector("#treatAlsoAffordable");
      const treatBudgetDisplay   = document.querySelector("#treatBudgetDisplay");
      const treatModeDisplay     = document.querySelector("#treatModeDisplay");
      const budgetBarCaption     = document.querySelector("#budgetBarCaption");
      const wishlistToast        = document.querySelector("#wishlistToast");
      const aiPickBtn            = document.querySelector("#aiPickBtn");
      const aiKeySection         = document.querySelector("#aiKeySection");
      const aiKeyInput           = document.querySelector("#aiKeyInput");
      const aiKeyConfirmBtn      = document.querySelector("#aiKeyConfirmBtn");  // eslint-disable-line
      const aiResultCard         = document.querySelector("#aiResultCard");
      const aiResultContent      = document.querySelector("#aiResultContent");
      const AI_KEY_STORAGE       = "wl-ai-key";

      // ── State ─────────────────────────────────────────────
      let state = loadLocal();

      getDoc(FIRESTORE_DOC).then((snap) => {
        if (!snap.exists()) return;
        const data = snap.data();
        state = { ...state, ...data, wishlist: Array.isArray(data.wishlist) ? data.wishlist : (state.wishlist || []) };
        renderWishlist();
        updateBudgetBar();
      }).catch(() => {});

      function loadLocal() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          const parsed = raw ? JSON.parse(raw) : {};
          return { wishlist: [], ...parsed };
        } catch {
          return { wishlist: [] };
        }
      }

      function persist() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        setDoc(FIRESTORE_DOC, JSON.parse(JSON.stringify(state))).catch(() => {});
      }

      function createId() {
        return window.crypto?.randomUUID?.() ?? `id-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function toNumber(v) {
        const n = parseFloat(v);
        return isFinite(n) && n > 0 ? n : 0;
      }

      function formatCurrency(v) {
        return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(v ?? 0);
      }

      // ── Budget calculation (mirrors script.js logic) ──────
      function calcBudget() {
        const checking      = toNumber(state.checking);
        const savings       = toNumber(state.savings);
        const expenses      = (state.expenses || []).map((e) => ({ ...e, amount: toNumber(e.amount) }));
        const payments      = (state.paymentEntries || []).map((e) => ({ ...e, amount: toNumber(e.amount) }));
        const spending      = expenses.filter((e) => e.category !== "Income");
        const income        = expenses.filter((e) => e.category === "Income");
        const chaseCharges  = spending.filter((e) => e.source === "Chase").reduce((s, e) => s + e.amount, 0);
        const zolveCharges  = spending.filter((e) => e.source === "Zolve").reduce((s, e) => s + e.amount, 0);
        const chasePaid     = payments.filter((e) => e.type === "Card Payment" && e.card === "Chase").reduce((s, e) => s + e.amount, 0);
        const zolvePaid     = payments.filter((e) => e.type === "Card Payment" && e.card === "Zolve").reduce((s, e) => s + e.amount, 0);
        const cardDebt      = Math.max(0, chaseCharges - chasePaid) + Math.max(0, zolveCharges - zolvePaid);
        const splitwiseOwe  = toNumber(state.splitwiseOweAmount);
        const checkingInc   = income.filter((e) => e.source === "Checking").reduce((s, e) => s + e.amount, 0);
        const checkingExp   = spending.filter((e) => e.source === "Checking").reduce((s, e) => s + e.amount, 0);
        const safeToSpend   = checking + checkingInc - checkingExp - cardDebt - splitwiseOwe;
        const totalMoneyLeft= checking + savings - cardDebt - splitwiseOwe;

        const mode          = TREAT_MODES[state.treatMode] || TREAT_MODES.Balanced;
        const trueFreeMoney = totalMoneyLeft - TREAT_SAFETY_BUFFER;
        let treatBudget     = 0;

        if (state.treatEnabled !== false && safeToSpend >= 0 && trueFreeMoney > 0 && safeToSpend > TREAT_SAFETY_BUFFER) {
          treatBudget = Math.min(trueFreeMoney * mode.percent, mode.cap);
          const cardRatio = cardDebt / (totalMoneyLeft || 1);
          if (cardRatio > mode.cardThreshold) treatBudget *= 0.5;
          const obligations = cardDebt + splitwiseOwe;
          if (obligations > totalMoneyLeft * 0.45) treatBudget *= 0.7;
          treatBudget = Math.max(0, Math.round(treatBudget * 100) / 100);
        }

        return { totalMoneyLeft, safeToSpend, treatBudget, modeName: state.treatMode || "Balanced" };
      }

      // ── Budget bar ────────────────────────────────────────
      function updateBudgetBar() {
        const { treatBudget, totalMoneyLeft, modeName } = calcBudget();
        treatBudgetDisplay.textContent = treatBudget > 0 ? formatCurrency(treatBudget) : "$0.00";
        treatModeDisplay.textContent   = modeName || "Balanced";
        treatModeDisplay.className     = "budget-mode-chip";

        if (treatBudget === 0) {
          budgetBarCaption.textContent = "No treat budget right now — focus on clearing obligations first.";
        } else {
          budgetBarCaption.textContent = `Total left after all obligations: ${formatCurrency(totalMoneyLeft)}`;
        }
      }

      // ── Affordability status for an item ─────────────────
      function affordStatus(priceNum, treatBudget, totalMoneyLeft) {
        if (priceNum <= 0) return null;
        if (priceNum <= treatBudget)                          return { cls: "afford-yes",     text: "Can treat yourself" };
        if (totalMoneyLeft - priceNum >= SAFETY_BUFFER)       return { cls: "afford-caution", text: "Affordable, over treat budget" };
        return { cls: "afford-no", text: "Saving needed" };
      }

      // ── Wishlist render ───────────────────────────────────
      function renderWishlist() {
        if (!state.wishlist) state.wishlist = [];
        wishlistItemsEl.innerHTML = "";

        if (state.wishlist.length === 0) {
          wishlistItemsEl.innerHTML = `<p class="wishlist-empty">No items yet. Tap "+ Add item" to start your list.</p>`;
          return;
        }

        const { treatBudget, totalMoneyLeft } = calcBudget();

        state.wishlist.forEach((item) => {
          const prio   = item.priority || "medium";
          const status = affordStatus(toNumber(item.price), treatBudget, totalMoneyLeft);

          const card = document.createElement("div");
          card.className = "wishlist-item";
          card.innerHTML = `
            <div class="wishlist-item-row">
              <input class="wishlist-name-input" type="text" placeholder="Item name (e.g. AirPods, weekend trip)" value="${escHtml(item.name || "")}" />
              <input class="wishlist-price-input" type="number" min="0" step="0.01" placeholder="$0.00" value="${escHtml(item.price || "")}" />
              <button class="ghost-button small-button wishlist-remove-btn" type="button" aria-label="Remove item">×</button>
            </div>
            <div class="wishlist-item-meta">
              <div class="priority-pills">
                <span class="priority-label">Priority:</span>
                <button class="priority-pill${prio === "low"    ? " pill-active pill-low"    : ""}" data-p="low"    type="button">Low</button>
                <button class="priority-pill${prio === "medium" ? " pill-active pill-medium" : ""}" data-p="medium" type="button">Mid</button>
                <button class="priority-pill${prio === "high"   ? " pill-active pill-high"   : ""}" data-p="high"   type="button">High</button>
              </div>
              ${status ? `<span class="afford-chip ${status.cls}">${status.text}</span>` : ""}
              <button class="extras-toggle-btn" type="button">
                ${(item.link || item.notes) ? "Link / notes ▾" : "+ Link / notes"}
              </button>
            </div>
            <div class="wishlist-extras${(item.link || item.notes) ? "" : " hidden"}">
              <input class="wishlist-link-input" type="url" placeholder="Link (optional)" value="${escHtml(item.link || "")}" />
              <input class="wishlist-notes-input" type="text" placeholder="Notes (optional)" value="${escHtml(item.notes || "")}" />
            </div>
          `;

          card.querySelector(".wishlist-name-input").addEventListener("input", (e) => {
            item.name = e.target.value;
            persist();
          });

          card.querySelector(".wishlist-price-input").addEventListener("input", (e) => {
            item.price = e.target.value;
            persist();
            renderWishlist();
          });

          card.querySelector(".wishlist-link-input").addEventListener("input", (e) => {
            item.link = e.target.value.trim();
            persist();
          });

          card.querySelector(".wishlist-notes-input").addEventListener("input", (e) => {
            item.notes = e.target.value;
            persist();
          });

          card.querySelector(".extras-toggle-btn").addEventListener("click", (e) => {
            const extras = card.querySelector(".wishlist-extras");
            const open   = extras.classList.toggle("hidden");
            e.currentTarget.textContent = open ? "+ Link / notes" : "Link / notes ▾";
          });

          card.querySelectorAll(".priority-pill").forEach((btn) => {
            btn.addEventListener("click", () => {
              item.priority = btn.dataset.p;
              persist();
              renderWishlist();
            });
          });

          card.querySelector(".wishlist-remove-btn").addEventListener("click", () => {
            state.wishlist = state.wishlist.filter((w) => w.id !== item.id);
            persist();
            renderWishlist();
            treatSuggestionCard.classList.add("hidden");
          });

          wishlistItemsEl.append(card);
        });
      }

      // ── Show / hide suggestion link ───────────────────────
      function setSuggestionLink(url) {
        if (url) {
          treatSuggestionLink.href = url;
          treatSuggestionLink.classList.remove("hidden");
        } else {
          treatSuggestionLink.href = "#";
          treatSuggestionLink.classList.add("hidden");
        }
      }

      // ── Savings timeline helper ───────────────────────────
      function savingsTimeline(gap) {
        if (gap <= 0) return "";
        if (gap <= 80)  return `Set aside ${formatCurrency(gap / 2)}/week → you'll have it in 2 weeks.`;
        if (gap <= 200) return `Set aside ${formatCurrency(gap / 4)}/week → you'll have it in 1 month.`;
        return `Set aside ${formatCurrency(Math.ceil(gap / 12))}/week → you'll have it in 3 months.`;
      }

      // ── Render suggestion card ────────────────────────────
      function showSuggestion(pick, mood, reason, others, gap) {
        const prio = pick.priority || "medium";
        treatPriorityBadge.textContent = PRIORITY_LABELS[prio];
        treatPriorityBadge.className   = `treat-priority-badge priority-badge-${prio}`;
        treatPriorityBadge.classList.remove("hidden");

        treatSuggestionName.textContent   = pick.name;
        treatSuggestionPrice.textContent  = formatCurrency(pick.priceNum);
        treatSuggestionReason.textContent = reason;
        treatSuggestionCard.className     = `treat-suggestion-card suggestion-${mood}`;
        setSuggestionLink(pick.link);

        const timeline = gap > 0 ? savingsTimeline(gap) : "";
        if (timeline) {
          treatSavingsTimeline.textContent = timeline;
          treatSavingsTimeline.classList.remove("hidden");
        } else {
          treatSavingsTimeline.classList.add("hidden");
        }

        treatMarkBoughtBtn.dataset.itemId = pick.id;
        treatMarkBoughtBtn.classList.remove("hidden");

        if (others.length > 0) {
          treatAlsoAffordable.innerHTML =
            `<p class="also-label">Also within budget:</p>` +
            others.map((o) =>
              `<div class="also-item">
                <span class="also-item-name">${escHtml(o.name)}</span>
                <span class="also-item-price">${formatCurrency(o.priceNum)}</span>
              </div>`
            ).join("");
          treatAlsoAffordable.classList.remove("hidden");
        } else {
          treatAlsoAffordable.classList.add("hidden");
        }
      }

      // ── Suggest treat ─────────────────────────────────────
      function suggestTreat() {
        const { totalMoneyLeft, treatBudget } = calcBudget();
        updateBudgetBar();

        const items = (state.wishlist || [])
          .map((w) => ({ ...w, priceNum: toNumber(w.price) }))
          .filter((w) => w.name && w.priceNum > 0)
          .sort((a, b) => {
            const pd = (PRIORITY_ORDER[a.priority || "medium"]) - (PRIORITY_ORDER[b.priority || "medium"]);
            return pd !== 0 ? pd : b.priceNum - a.priceNum;
          });

        treatSuggestionCard.classList.remove("hidden");
        treatSuggestionCard.scrollIntoView({ behavior: "smooth", block: "nearest" });

        if (items.length === 0) {
          treatPriorityBadge.classList.add("hidden");
          treatSuggestionName.textContent   = "Nothing on your list yet";
          treatSuggestionPrice.textContent  = "";
          treatSuggestionReason.textContent = "Add items with names and prices first.";
          treatSuggestionCard.className     = "treat-suggestion-card";
          treatSavingsTimeline.classList.add("hidden");
          treatMarkBoughtBtn.classList.add("hidden");
          treatAlsoAffordable.classList.add("hidden");
          setSuggestionLink("");
          return;
        }

        const affordable = items.filter((w) => w.priceNum <= treatBudget);
        const withinSafe = items.filter((w) => totalMoneyLeft - w.priceNum >= SAFETY_BUFFER);

        if (affordable.length > 0) {
          showSuggestion(
            affordable[0],
            "good",
            `Fits your ${formatCurrency(treatBudget)} guilt-free treat budget. Go for it!`,
            affordable.slice(1, 3),
            0
          );
          return;
        }

        if (withinSafe.length > 0) {
          const pick = withinSafe[0];
          const gap  = pick.priceNum - treatBudget;
          showSuggestion(
            pick,
            "caution",
            `${formatCurrency(gap)} over your ${formatCurrency(treatBudget)} treat budget, but you can cover it. Just no extra cushion.`,
            withinSafe.slice(1, 3),
            gap
          );
          return;
        }

        const cheapest = [...items].sort((a, b) => a.priceNum - b.priceNum)[0];
        const needed   = cheapest.priceNum - (totalMoneyLeft - SAFETY_BUFFER);
        showSuggestion(
          cheapest,
          "bad",
          `Not yet — you'd need ${formatCurrency(Math.max(0, needed))} more to clear your $${SAFETY_BUFFER} safety buffer.`,
          [],
          needed
        );
      }

      // ── Mark as bought ────────────────────────────────────
      function markAsBought(id) {
        const item = (state.wishlist || []).find((w) => w.id === id);
        const name = item ? item.name : "item";
        state.wishlist = (state.wishlist || []).filter((w) => w.id !== id);
        persist();
        renderWishlist();
        treatSuggestionCard.classList.add("hidden");
        showToast(`Congrats! "${name}" marked as bought.`);
      }

      // ── Toast ─────────────────────────────────────────────
      let toastTimer;
      function showToast(msg) {
        wishlistToast.textContent = msg;
        wishlistToast.classList.remove("hidden");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => wishlistToast.classList.add("hidden"), 3000);
      }

      // ── Escape helper (prevent XSS in innerHTML) ─────────
      function escHtml(str) {
        return String(str).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      // ── AI key management ────────────────────────────────
      // Priority: config.js (gitignored local file) → localStorage → UI input
      let _configFileKey = "";
      try {
        const mod = await import("./config.js");
        _configFileKey = (mod.ANTHROPIC_KEY || "").trim();
      } catch { /* config.js not present — use localStorage/UI */ }

      function loadAiKey() {
        return _configFileKey || localStorage.getItem(AI_KEY_STORAGE) || "";
      }

      function initAiKey() {
        const key = loadAiKey();
        if (_configFileKey) {
          // Key comes from config.js — hide the input section, show a status note
          aiKeyInput.value = "••••••••••••••••••• (loaded from config.js)";
          aiKeyInput.disabled = true;
          aiKeyConfirmBtn.textContent = "Clear";
        } else if (key) {
          aiKeyInput.value = key;
        }
      }

      aiKeyConfirmBtn.addEventListener("click", () => {
        if (_configFileKey) {
          showToast("Key is set in config.js — edit that file to change it.");
          aiKeySection.classList.add("hidden");
          return;
        }
        const key = aiKeyInput.value.trim();
        localStorage.setItem(AI_KEY_STORAGE, key);
        aiKeySection.classList.add("hidden");
        showToast(key ? "API key saved." : "API key cleared.");
      });

      // ── AI Pick ───────────────────────────────────────────
      aiPickBtn.addEventListener("click", async () => {
        const key = loadAiKey();

        if (!key) {
          aiKeySection.classList.toggle("hidden");
          return;
        }

        const { totalMoneyLeft, treatBudget, modeName } = calcBudget();
        const items = (state.wishlist || [])
          .map((w) => ({ ...w, priceNum: toNumber(w.price) }))
          .filter((w) => w.name && w.priceNum > 0)
          .sort((a, b) => (PRIORITY_ORDER[a.priority || "medium"]) - (PRIORITY_ORDER[b.priority || "medium"]));

        if (items.length === 0) {
          showToast("Add items with names and prices first.");
          return;
        }

        aiPickBtn.disabled = true;
        aiPickBtn.textContent = "Thinking…";
        aiResultCard.classList.remove("hidden");
        aiResultCard.className = "ai-result-card";
        aiResultContent.textContent = "Analyzing your wishlist…";
        aiResultCard.scrollIntoView({ behavior: "smooth", block: "nearest" });

        const itemLines = items.map((w, i) => {
          let line = `${i + 1}. ${w.name} — ${formatCurrency(w.priceNum)}, priority: ${w.priority || "medium"}`;
          if (w.notes) line += `, notes: "${w.notes}"`;
          return line;
        }).join("\n");

        const prompt = `You are a personal finance advisor. Help decide which wishlist item is the best purchase right now.

Financial snapshot:
- Total money left (after all bills and card payments): ${formatCurrency(totalMoneyLeft)}
- Guilt-free treat budget (can spend without stress): ${formatCurrency(treatBudget)}
- Spending mode: ${modeName}
- Safety buffer they want to keep: $${SAFETY_BUFFER}

Wishlist:
${itemLines}

Which item should they buy and why? Be direct and specific in 2–3 sentences. Consider financial health, assigned priority, value for money, and any notes they've written. If nothing is affordable right now, say so honestly and tell them what to save toward first.`;

        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-api-key": key,
              "anthropic-version": "2023-06-01",
              "anthropic-dangerous-direct-browser-access": "true"
            },
            body: JSON.stringify({
              model: "claude-haiku-4-5-20251001",
              max_tokens: 300,
              messages: [{ role: "user", content: prompt }]
            })
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || `API error ${res.status}`);
          }

          const data = await res.json();
          const text = data.content?.[0]?.text?.trim() || "No response received.";
          aiResultContent.textContent = text;

        } catch (err) {
          aiResultCard.className = "ai-result-card ai-result-error";
          aiResultContent.textContent = err.message.includes("401")
            ? "Invalid API key — click AI Pick to update it."
            : `Error: ${err.message}`;
        } finally {
          aiPickBtn.disabled = false;
          aiPickBtn.innerHTML = `<svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true" style="vertical-align:-2px;margin-right:6px"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 0 2h-1v1a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-1H2a1 1 0 0 1 0-2h1a7 7 0 0 1 7-7h1V5.73A2 2 0 0 1 10 4a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><circle cx="9" cy="14" r="1" fill="currentColor"/><circle cx="15" cy="14" r="1" fill="currentColor"/></svg>AI Pick`;
        }
      });

      initAiKey();

      // ── Event listeners ───────────────────────────────────
      addWishlistItemBtn.addEventListener("click", () => {
        if (!state.wishlist) state.wishlist = [];
        state.wishlist.push({ id: createId(), name: "", price: "", link: "", notes: "", priority: "medium" });
        persist();
        renderWishlist();
      });

      suggestTreatBtn.addEventListener("click", suggestTreat);

      saveWishlistBtn.addEventListener("click", async () => {
        saveWishlistBtn.disabled = true;
        saveWishlistBtn.textContent = "Saving…";
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
          await setDoc(FIRESTORE_DOC, JSON.parse(JSON.stringify(state)));
          showToast("Wishlist saved to cloud.");
        } catch {
          showToast("Saved locally — cloud sync failed.");
        } finally {
          saveWishlistBtn.disabled = false;
          saveWishlistBtn.innerHTML = `<svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true" style="vertical-align:-2px;margin-right:5px"><path d="M5 3h11l3 3v15H5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M8 3v6h8V3" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 17h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>Save`;
        }
      });

      treatMarkBoughtBtn.addEventListener("click", () => {
        const id = treatMarkBoughtBtn.dataset.itemId;
        if (id) markAsBought(id);
      });

      renderWishlist();
      updateBudgetBar();
    </script>
  </body>
</html>
